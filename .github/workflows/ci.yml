name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read


jobs:
  python-tests:
    name: Python Tests

    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall app

      - name: Test project search
        run: python test_project_search.py

      - name: Test request protection
        run: python test_request_guard.py

      - name: Test feedback storage
        run: python test_feedback_store.py

      - name: Test feedback analytics
        run: python test_feedback_analytics.py

      - name: Test FastAPI import
        env:
          OPENAI_API_KEY: ci-placeholder-not-used
          ADMIN_API_TOKEN: ci-admin-token-placeholder-1234567890
          OPENAI_AGENTS_DISABLE_TRACING: "1"
        run: |
          python -c "from app.api import app; print('FastAPI application:', app.title)"


  docker-build:
    name: Docker Build

    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: |
          docker build \
            --tag haoyu-ai-interview-agent:ci \
            .